<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ArcGIS Velocity Simulator</title>
  <link rel="stylesheet" href="themes.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header-controls">
    <h1><span class="app-title">ArcGIS Velocity Simulator</span></h1>
    <div class="theme-selector-container">
      <div class="theme-switcher">
        <select id="theme-select">
          <option value="blue">🔵 Blue</option>
          <option value="color-blind">🟡 Color Blind</option>
          <option value="dark">🌙 Dark</option>
          <option value="dark-gray">🌫️ Dark Gray</option>
          <option value="green">🟢 Green</option>
          <option value="high-contrast">⚫ High Contrast</option>
          <option value="light">☀️ Light</option>
          <option value="light-gray">☁️ Light Gray</option>
          <option value="midnight">🌌 Midnight</option>
          <option value="mocha">☕ Mocha</option>
          <option value="ocean">🌊 Ocean</option>
          <option value="rose">🌸 Rose</option>
          <option value="rose-dark">🌺 Rose Dark</option>
          <option value="sunset">🌅 Sunset</option>
          <option value="system">💻 System</option>
        </select>
      </div>
      <button id="toggle-gesture-report" class="control-button" title="Report Camera Gestures" data-enabled="false">
        <div class="button-icon icon-report-gesture"></div>
      </button>
      <button id="toggle-camera-button" class="control-button" title="Toggle Camera&#10;---&#10;Supported Gestures:&#10;👍 Thumbs up: Connect&#10;🤙 Call me hand: Disconnect&#10;👊 Fist: Play&#10;🖐️ Open hand: Pause&#10;✌️ Peace sign: Step">
        <svg class="button-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 10.5a2.5 2.5 0 100-5 2.5 2.5 0 000 5z"/><path fill-rule="evenodd" d="M3.25 6.25a3 3 0 013-3h11.5a3 3 0 013 3v10.5a3 3 0 01-3 3H6.25a3 3 0 01-3-3V6.25zm3-1.5a1.5 1.5 0 00-1.5 1.5v10.5a1.5 1.5 0 001.5 1.5h11.5a1.5 1.5 0 001.5-1.5V6.25a1.5 1.5 0 00-1.5-1.5H6.25z" clip-rule="evenodd"/></svg>
      </button>
      <button id="toggle-mic-button" class="control-button" title="Toggle Microphone (Web Speech API)&#10;---&#10;Requires internet connection&#10;Supported Commands:&#10;🔌 connect&#10;✕ disconnect&#10;▶ play / start&#10;⏸ pause / stop&#10;⏭ step&#10;⇔ switch / toggle view"><svg class="button-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M11.999 15a3 3 0 003-3V6a3 3 0 00-6 0v6a3 3 0 003 3z"/><path d="M18.75 12a.75.75 0 01-.75.75a6.002 6.002 0 01-12.004 0A.75.75 0 016.75 12v-1.5a.75.75 0 011.5 0V12a4.5 4.5 0 009 0v-1.5a.75.75 0 011.5 0V12z"/><path d="M11.999 17.25a.75.75 0 01.75.75v2.25a.75.75 0 01-1.5 0V18a.75.75 0 01.75-.75z"/><path d="M10 18a2 2 0 114 0h-4z"/></svg></button>
      <button id="offline-mic-button" class="control-button" title="Toggle Offline Speech Recognition (Web Audio API)&#10;---&#10;100% Offline Voice Control&#10;✓ No internet required&#10;🔒 Privacy-focused&#10;⚡ Real-time audio analysis&#10;---&#10;Supported Commands:&#10;🔌 connect&#10;✕ disconnect&#10;▶ play / start&#10;⏸ pause / stop&#10;⏭ step&#10;⇔ switch / toggle view">
        <div class="button-icon icon-offline-microphone"></div>
      </button>
      <button id="toggle-view-button" class="control-button" title="Switch to Compact View"><svg class="button-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M4.5 4.5a1.5 1.5 0 00-1.5 1.5v10.5a1.5 1.5 0 001.5 1.5h15a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5h-15zM3 6a3 3 0 013-3h15a3 3 0 013 3v10.5a3 3 0 01-3 3H6a3 3 0 01-3-3V6z"/><path d="M6 8.25a.75.75 0 000 1.5h12a.75.75 0 000-1.5H6z"/></svg></button>
      <button id="toggle-status-log" class="control-button" title="Toggle Status Log" data-enabled="true">
        <div class="button-icon icon-status-log"></div>
      </button>
      <button id="toggle-connection-controls" class="control-button" title="Toggle Connection Controls" data-enabled="true">
        <div class="button-icon icon-connection-controls"></div>
      </button>
      <button id="cli-btn" class="control-button" title="Command Line Interface (F3)" aria-label="Open Command Line Interface dialog">
        <span class="button-icon text-button-icon" aria-hidden="true" style="font-family: monospace; font-weight: bold; font-size: 13px;">&gt;_</span>
      </button>
      <button id="velocity-login-btn" class="control-button" title="Sign In to ArcGIS Velocity: browse feeds and auto-configure connection" aria-label="Sign In to ArcGIS Velocity">
        <span class="button-icon text-button-icon" style="font-size: 14px;">🔑</span>
      </button>
    </div>
  </div>

  <div class="main-content">
    <div class="controls-wrapper">
      <div>
        <div class="connection-controls-group">
          <div class="control-group aligned-group">
            <label for="csv-file">File:</label>
            <button id="select-file" class="primary-control" title="Select File">
              <div class="button-icon icon-select-file"></div>
            </button>
            <span id="file-path">No file selected</span>
          </div>
          <div class="control-group aligned-group">
            <label for="connection-type">Mode:</label>
            <select id="connection-type">
              <option value="tcp-server" selected title="TCP Server - listens on the specified port and accepts incoming TCP connections from clients. Use when the receiver (e.g. ArcGIS Velocity TCP feed) connects to this app.">TCP Server</option>
              <option value="tcp-client" title="TCP Client - connects to a remote TCP server at the specified host and port. Use when sending data to a listening TCP endpoint.">TCP Client</option>
              <option value="udp-server" title="UDP Server - binds to the specified port and receives incoming UDP datagrams. Connectionless; each datagram is independent.">UDP Server</option>
              <option value="udp-client" title="UDP Client - sends UDP datagrams to the specified host and port. Connectionless; no handshake or acknowledgment.">UDP Client</option>
              <option value="http-client" title="HTTP Client - sends data via HTTP/HTTPS POST requests to a remote endpoint (e.g. an ArcGIS Velocity HTTP Receiver feed). Supports JSON, CSV, Esri JSON, GeoJSON, and XML formats.">HTTP Client</option>
              <option value="http-server" title="HTTP Server - starts a local HTTP/HTTPS server that accepts POST requests from clients. Use for testing or when the Velocity HTTP Receiver connects to this app.">HTTP Server</option>
              <option value="ws-client" title="WebSocket Client - connects to a remote WebSocket server (ws:// or wss://) and sends data as text frames. Supports the same formats as HTTP. Use when the receiver is a WebSocket endpoint such as an ArcGIS Velocity WebSocket feed.">WebSocket Client</option>
              <option value="ws-server" title="WebSocket Server - starts a local WebSocket server that accepts incoming ws:// or wss:// connections from clients. Broadcasts data to all connected clients as text frames.">WebSocket Server</option>
              <option value="grpc-client" title="gRPC Client - connects to a remote gRPC server using HTTP/2. Supports Protobuf, Kryo, and Text serialization with client-streaming or unary RPCs.">gRPC Client</option>
              <option value="grpc-server" title="gRPC Server - starts a local gRPC server that accepts incoming RPC calls from clients. Use for testing or when Velocity connects as a gRPC client.">gRPC Server</option>
            </select>
          </div>
          <!-- Extra Options disclosure row - shown only for HTTP/WS/gRPC modes -->
          <div class="extra-options-toggle-row" id="extra-options-toggle-row" style="display: none;">
            <button id="extra-options-toggle" class="extra-options-toggle-btn" type="button" title="Expand protocol-specific connection options." aria-expanded="false" aria-controls="extra-options-body" aria-label="Expand protocol-specific connection options.">
              <span class="extra-options-arrow" aria-hidden="true">▸</span>
              <span class="extra-options-label">Protocol Options</span>
            </button>
          </div>
          <!-- Collapsible extra options (protocol-specific controls) -->
          <div id="extra-options-body" class="extra-options-body" style="display: none;">
          <div class="control-group aligned-group" id="http-format-group" style="display: none;">
            <label for="http-format">Format:</label>
            <select id="http-format" title="HTTP data format - controls the Content-Type header used when sending/receiving data. Must match the format configured in the ArcGIS Velocity HTTP Receiver feed.">
              <option value="delimited" selected title="Delimited (CSV) - sends data as text/plain. Each line is a comma-separated row of field values. This is the default format for ArcGIS Velocity TCP and HTTP feeds. Best for simple tabular data without nested structures.">Delimited (CSV)</option>
              <option value="json" title="JSON - sends data as application/json. The standard format for most HTTP feeds. Each request body is a JSON object or array of features.">JSON</option>
              <option value="esri-json" title="Esri JSON - sends data as application/json using the Esri Feature JSON schema (with geometry and attributes objects). Use when the Velocity HTTP Receiver expects ArcGIS-native feature format.">Esri JSON</option>
              <option value="geo-json" title="GeoJSON - sends data as application/geo+json per RFC 7946 with FeatureCollection and Feature objects. Use when the receiver expects standard geospatial interchange format.">GeoJSON</option>
              <option value="xml" title="XML - sends data as application/xml. Use when the Velocity HTTP Receiver is configured for XML input.">XML</option>
            </select>
          </div>
          <div class="control-group aligned-group" id="http-tls-group" style="display: none;">
            <label for="http-tls">
               <input type="checkbox" id="http-tls" checked title="Enable TLS (HTTPS) for the HTTP connection. When checked, the connection uses HTTPS (port 8443 by default). When unchecked, uses plain HTTP (port 8080). In client mode, the OS certificate store is used automatically; in server mode, a certificate and key must be provided."> Use TLS
            </label>
          </div>
          <div class="control-group aligned-group" id="http-tls-ca-group" style="display: none;">
            <label for="http-tls-ca-path">CA cert:</label>
            <input type="text" id="http-tls-ca-path" placeholder="(system default)" title="Path to a custom CA certificate file (PEM). Leave empty to use the OS certificate store automatically. Only needed for enterprise or self-signed CAs not in the system trust store.">
          </div>
          <div class="control-group aligned-group" id="http-tls-cert-group" style="display: none;">
            <label for="http-tls-cert-path">TLS cert:</label>
            <input type="text" id="http-tls-cert-path" placeholder="(optional)" title="Path to a client or server certificate file (PEM). Required for server-mode TLS. For client mode, only needed for mutual TLS (mTLS) authentication.">
          </div>
          <div class="control-group aligned-group" id="http-tls-key-group" style="display: none;">
            <label for="http-tls-key-path">TLS key:</label>
            <input type="text" id="http-tls-key-path" placeholder="(optional)" title="Path to the private key file (PEM) corresponding to the TLS certificate. Required for server-mode TLS and client-side mTLS.">
          </div>
          <div class="control-group aligned-group" id="http-path-group" style="display: none;">
            <label for="http-path">HTTP path:</label>
            <input type="text" id="http-path" value="/" title="HTTP endpoint URL path appended after the host:port (e.g. /receiver/feed-id). In server mode, only POST requests matching this path are accepted; all others return 404. In client mode, this path is used in the outgoing POST request URL. Default is /.">
          </div>
          <div class="control-group aligned-group" id="ws-format-group" style="display: none;">
            <label for="ws-format">Format:</label>
            <select id="ws-format" title="WebSocket data format - controls the Content-Type associated with each message. Must match the format configured in the ArcGIS Velocity WebSocket feed.">
              <option value="delimited" selected title="Delimited (CSV) - each message is a comma-separated row of field values (text/plain). Default format for ArcGIS Velocity WebSocket feeds.">Delimited (CSV)</option>
              <option value="json" title="JSON - each message is a JSON object or array (application/json).">JSON</option>
              <option value="esri-json" title="Esri JSON - each message uses the Esri Feature JSON schema (application/json).">Esri JSON</option>
              <option value="geo-json" title="GeoJSON - each message is a GeoJSON FeatureCollection or Feature (application/geo+json).">GeoJSON</option>
              <option value="xml" title="XML - each message is an XML payload (application/xml).">XML</option>
            </select>
          </div>
          <div class="control-group aligned-group" id="ws-tls-group" style="display: none;">
            <label for="ws-tls">
               <input type="checkbox" id="ws-tls" checked title="Enable TLS (WSS) for the WebSocket connection. When checked, the connection uses the secure wss:// protocol (port 8443 by default). When unchecked, uses the plain ws:// protocol (port 8080). In client mode, the OS certificate store is used automatically; in server mode, a certificate and key must be provided."> Use TLS
            </label>
          </div>
          <div class="control-group aligned-group" id="ws-tls-ca-group" style="display: none;">
            <label for="ws-tls-ca-path">CA cert:</label>
            <input type="text" id="ws-tls-ca-path" placeholder="(system default)" title="Path to a custom CA certificate file (PEM). Leave empty to use the OS certificate store automatically. Only needed for enterprise or self-signed CAs not in the system trust store.">
          </div>
          <div class="control-group aligned-group" id="ws-tls-cert-group" style="display: none;">
            <label for="ws-tls-cert-path">TLS cert:</label>
            <input type="text" id="ws-tls-cert-path" placeholder="(optional)" title="Path to a client or server certificate file (PEM). Required for server-mode TLS. For client mode, only needed for mutual TLS (mTLS) authentication.">
          </div>
          <div class="control-group aligned-group" id="ws-tls-key-group" style="display: none;">
            <label for="ws-tls-key-path">TLS key:</label>
            <input type="text" id="ws-tls-key-path" placeholder="(optional)" title="Path to the private key file (PEM) corresponding to the TLS certificate. Required for server-mode TLS and client-side mTLS.">
          </div>
          <div class="control-group aligned-group" id="ws-path-group" style="display: none;">
            <label for="ws-path">WS path:</label>
            <input type="text" id="ws-path" value="/" title="WebSocket endpoint URL path appended after the host:port (e.g. /feed/stream-id). In server mode, only WebSocket upgrade requests matching this path are accepted. In client mode, this path is used in the outgoing connection URL, e.g. wss://host:8443/feed/stream-id. Default is /.">
          </div>
          <div class="control-group aligned-group" id="ws-subscription-msg-group" style="display: none;">
            <label for="ws-subscription-msg">Subscribe:</label>
            <input type="text" id="ws-subscription-msg" placeholder="(optional)" title="Optional subscription message sent to the WebSocket server immediately after connecting. Many WebSocket APIs require a subscription or authentication message before they begin streaming data. Leave empty if not needed.">
          </div>
          <div class="control-group aligned-group" id="ws-ignore-first-msg-group" style="display: none;">
            <label for="ws-ignore-first-msg">
               <input type="checkbox" id="ws-ignore-first-msg" title="Ignore the first message received after connecting. Some WebSocket servers send a subscription acknowledgment or welcome message before actual data. Enable this to skip that first message so only real data is processed."> Ignore 1st msg
            </label>
          </div>
          <div class="control-group aligned-group" id="ws-headers-group" style="display: none;">
            <label for="ws-headers">Headers:</label>
            <input type="text" id="ws-headers" placeholder='(optional, JSON)' title='Custom HTTP headers sent during the WebSocket upgrade handshake, as a JSON object (e.g. {"Authorization":"Bearer token123","X-Custom":"value"}). Leave empty if no custom headers are needed.'>
          </div>
          <div class="control-group aligned-group" id="grpc-serialization-group" style="display: none;">
            <label for="grpc-serialization">Serialization:</label>
            <select id="grpc-serialization">
              <option value="protobuf" selected>Protobuf</option>
              <option value="kryo">Kryo</option>
              <option value="text">Text</option>
            </select>
          </div>
          <div class="control-group aligned-group" id="grpc-send-method-group" style="display: none;">
            <label for="grpc-send-method">RPC type:</label>
            <select id="grpc-send-method">
              <option value="stream" selected title="Client Streaming RPC - opens a persistent stream and sends all messages over a single long-lived connection. Higher throughput and lower per-message overhead. Uses Stream (GrpcFeed) or executeMulti (GrpcFeatureService).">Client Streaming</option>
              <option value="unary" title="Unary RPC - sends each message as an independent request/response call. Simpler to debug and reason about, but higher per-message overhead. Uses Send (GrpcFeed) or execute (GrpcFeatureService).">Unary</option>
            </select>
          </div>
          <div class="control-group aligned-group" id="grpc-tls-group" style="display: none;">
            <label for="grpc-tls">
              <input type="checkbox" id="grpc-tls" checked title="Use TLS (SSL) for the gRPC connection"> Use TLS
            </label>
          </div>
          <div class="control-group aligned-group" id="grpc-tls-ca-group" style="display: none;">
            <label for="grpc-tls-ca-path">CA cert:</label>
            <input type="text" id="grpc-tls-ca-path" placeholder="(system default)" title="Path to CA certificate file (PEM). Leave empty to use the system default CA bundle.">
          </div>
          <div class="control-group aligned-group" id="grpc-tls-cert-group" style="display: none;">
            <label for="grpc-tls-cert-path">TLS cert:</label>
            <input type="text" id="grpc-tls-cert-path" placeholder="(optional)" title="Path to client/server certificate file (PEM) for mutual TLS.">
          </div>
          <div class="control-group aligned-group" id="grpc-tls-key-group" style="display: none;">
            <label for="grpc-tls-key-path">TLS key:</label>
            <input type="text" id="grpc-tls-key-path" placeholder="(optional)" title="Path to private key file (PEM) for mutual TLS.">
          </div>
          <div class="control-group aligned-group" id="grpc-header-path-key-group" style="display: none;">
            <label for="grpc-header-path-key">Header path key:</label>
            <input type="text" id="grpc-header-path-key" value="grpc-path" title="gRPC endpoint header path key">
          </div>
          <div class="control-group aligned-group" id="grpc-header-path-group" style="display: none;">
            <label for="grpc-header-path">Header path:</label>
            <input type="text" id="grpc-header-path" value="replace.with.dedicated.uid" title="gRPC endpoint header path">
          </div>
          </div><!-- /#extra-options-body -->
          <div class="control-group combined-input-group aligned-group">
            <label for="ip-address">Connection:</label>
            <input type="text" id="ip-address" value="127.0.0.1" title="IP Address">
            <input type="number" id="port" value="5565" title="Port">
          </div>
        </div>
        <div class="control-group combined-input-group aligned-group">
          <label for="lines-per-interval">Lines / ms:</label>
          <input type="number" id="lines-per-interval" value="1" min="1" step="1" title="Lines count">
          <input type="number" id="rate-ms" value="1000" min="100" step="100" title="Interval in Milliseconds">
        </div>
      </div>

      <!-- Action Buttons: Icon-only design for clean, modern UI -->
      <!-- All buttons use SVG icons with tooltips for accessibility -->
      <div class="control-group action-buttons">
        <!-- Connect Button: Establishes connection to data source -->
        <button id="connect" title="Connect to the configured endpoint (Cmd+Shift+C)">
          <div class="button-icon icon-connect"></div>
        </button>
        
        <!-- Disconnect Button: Terminates connection to data source -->
        <button id="disconnect" title="Disconnect from the current connection (Cmd+D)" disabled>
          <div class="button-icon icon-disconnect"></div>
        </button>
        
        <!-- Play/Pause Button: Contains both icons, CSS controls which is visible -->
        <!-- JavaScript toggles 'is-playing' class to swap between play and pause icons -->
        <button id="play-pause" title="Play: start streaming data from the loaded file" disabled>
          <div class="button-icon icon-play"></div>
          <div class="button-icon icon-pause"></div>
        </button>
        
        <!-- Step Button: Sends a single data point manually -->
        <button id="send-manual" title="Step: send the next single line of data" disabled>
          <div class="button-icon icon-step"></div>
        </button>
      </div>
      
      <!-- Current Line Preview -->
      <div class="control-group">
        <span id="line-preview-text" class="line-preview-text">-</span>
      </div>

      <!-- Current Line Slider -->
      <div class="slider-group">
        <div class="control-group">
          <input type="range" id="line-slider" min="0" value="0" disabled class="slider">
        </div>
      </div>
      
    </div>
      <div class="camera-container">
        <video id="video-feed" style="transform: scaleX(-1); display: none; width: 240px; height: 180px; border-radius: 8px;"></video>
        <div id="last-gesture-received">-</div>
        <div id="live-gesture-received">-</div>
      </div>

    <div id="resizer"></div>

    <div class="status-area">
      <div class="status-header">
        <h2>Status Log</h2>
        <div class="status-buttons-group">
          <button id="toggle-gesture-logging" class="control-button" title="Log Camera Gestures" data-enabled="false">
            <div class="button-icon icon-hand-gesture-logging"></div>
          </button>
          <button id="toggle-mic-logging" class="control-button" title="Log Microphone Commands" data-enabled="false">
            <div class="button-icon icon-mic-logging"></div>
          </button>
          <button id="clear-status" title="Clear Status Log (Cmd+Delete / Ctrl+Delete)">
            <div class="button-icon icon-clear-logs"></div>
          </button>
          <button id="toggle-sort-order" class="control-button" title="Order: Ascending" data-order="ascending">
            <div class="button-icon icon-ascending"></div>
          </button>
        </div>
      </div>
      <div class="offline-speech-status">
        <div id="offline-status-indicator" class="offline-status">Offline speech recognition ready</div>
        <div id="offline-confidence-display" class="offline-confidence">70%</div>
        <div id="offline-visualizer" class="offline-visualizer"></div>
      </div>
      <div id="status-messages"></div>
      <div class="status-footer">
      </div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-bar-left">
      <button id="toggle-loop-button" class="control-button" title="Toggle Continuous Loop">
        <img src="assets/loop.svg" alt="Toggle Loop" />
      </button>
      <div class="separator"></div>
      <div id="line-info-container" class="status-text-wrapper">
        <span id="line-info-display">0 / 0</span>
      </div>
    </div>
    <div class="status-bar-center">
      <span id="app-state-emoji"></span>
      <div id="app-state">-</div>
      <div id="tls-badge" class="tls-badge" role="button" tabindex="0" style="display:none;" aria-label="TLS status" aria-pressed="false" data-tooltip="TLS status" data-tooltip-icon="🔒" data-tooltip-kind="secure">
        <span id="tls-badge-icon" class="tls-badge-icon" aria-hidden="true">🔒</span>
        <div id="tls-badge-popover" class="tls-badge-popover" role="tooltip">
          <pre id="tls-badge-content" class="tls-badge-content"></pre>
        </div>
      </div>
      <span id="auth-badge-wrapper" class="auth-badge-wrapper" style="display:none;">
        <span id="auth-badge" class="tls-badge auth-badge" role="button" tabindex="0" aria-label="Velocity token sending is off" aria-pressed="false" data-tooltip="Velocity token status" data-tooltip-icon="🔑" data-tooltip-kind="auth">
          <span id="auth-badge-icon" class="tls-badge-icon" aria-hidden="true">🔑</span>
          <span id="auth-badge-label" class="auth-badge-label">Token Off</span>
        </span>
        <span id="auth-badge-popover" class="tls-badge-popover" role="tooltip">
          <span id="auth-badge-content" class="tls-badge-content"></span>
        </span>
      </span>
    </div>
    <div class="status-bar-right">
      <div id="lines-sent-container" class="status-text">
        <span class="lines-sent-label">Lines Sent: </span>
        <span id="lines-sent-value">0</span>
      </div>
    </div>
  </div>

  <script src="gestures.js"></script>
  <script src="tooltip-utils.js"></script>
  <script src="velocity-auth-utils.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
