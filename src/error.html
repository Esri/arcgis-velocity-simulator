<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error</title>
  <link rel="stylesheet" href="themes.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: var(--bg-color);
      color: var(--text-color);
      transition: background-color 0.3s, color 0.3s;
    }

    h1 {
      margin-top: 0;
      font-size: 18px;
      font-weight: 600;
      color: var(--error-text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .error-icon {
      font-size: 20px;
    }

    .error-message {
      background-color: var(--error-bg);
      border: 1px solid var(--error-border);
      border-radius: 4px;
      padding: 15px;
      margin-bottom: 15px;
      font-size: 14px;
      line-height: 1.4;
    }

    .error-details {
      background-color: var(--code-bg);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      padding: 15px;
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
      font-size: 12px;
      line-height: 1.4;
      white-space: pre-wrap;
      overflow-x: auto;
      max-height: 300px;
      overflow-y: auto;
      margin-bottom: 15px;
    }

    .button-container {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    button {
      background-color: var(--button-bg);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: var(--button-hover);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .copy-feedback {
      color: #28a745;
      font-size: 12px;
      margin-left: 10px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .copy-feedback.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <h1>
    <span class="error-icon">⚠️</span>
    An Unexpected Error Occurred
  </h1>
  
  <div class="error-message" id="errorMessage">
    An unexpected error occurred. You can help us improve the application by sending the error details to the developer.
  </div>
  
  <div class="error-details" id="errorDetails">
    Loading error details...
  </div>
  
  <div class="button-container">
    <span class="copy-feedback" id="copyFeedback">Copied to clipboard!</span>
    <button id="copyButton">Copy</button>
    <button id="sendButton">Send to Developer</button>
    <button id="closeButton">Close</button>
  </div>

  <script>
    let errorData = null;

    // Listen for error data from main process
    window.electronAPI.onLoadErrorData((data) => {
      errorData = data;
      
      // Apply theme
      document.body.className = data.theme || 'light';
      
      // Notify main process that theme has been applied
      window.api.errorThemeApplied();
      
      // Display error message
      document.getElementById('errorMessage').textContent = data.message;
      
      // Display error details
      document.getElementById('errorDetails').textContent = data.details;
    });

    // Copy to clipboard functionality
    document.getElementById('copyButton').addEventListener('click', async () => {
      if (errorData) {
        try {
          await navigator.clipboard.writeText(errorData.details);
          
          // Show feedback
          const feedback = document.getElementById('copyFeedback');
          feedback.classList.add('show');
          setTimeout(() => {
            feedback.classList.remove('show');
          }, 2000);
        } catch (err) {
          console.error('Failed to copy to clipboard:', err);
        }
      }
    });

    // Send to developer functionality
    document.getElementById('sendButton').addEventListener('click', () => {
      if (errorData) {
        window.electronAPI.sendErrorTodeveloper(errorData.details);
      }
    });

    // Close button functionality
    document.getElementById('closeButton').addEventListener('click', () => {
      window.close();
    });

    // Close on Escape key
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        window.close();
      }
    });
  </script>
</body>
</html>
