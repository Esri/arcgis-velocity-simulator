<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading...</title>
  <link rel="stylesheet" href="themes.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      transition: background-color 0.3s, color 0.3s;
    }
    .logo {
      width: 128px;
      height: 128px;
      margin-bottom: 24px;
      filter: drop-shadow(0 0 8px rgba(79, 172, 254, 0.3));
    }
    .app-title {
      font-size: 1.75em;
      font-weight: 600;
      color: var(--text-color);
      margin-bottom: 24px;
      letter-spacing: 0.5px;
      background: linear-gradient(90deg, var(--title-gradient-start), var(--title-gradient-mid) 60%, var(--title-gradient-end) 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 2px 10px rgba(0, 242, 254, 0.1);
    }
    .progress-bar-bg {
      width: 280px;
      height: 8px;
      background-color: var(--border-color);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--close-bg), var(--close-hover-bg));
      border-radius: 4px;
      transition: width 0.4s ease;
    }
    .loading-text {
      font-size: 1em;
      color: var(--details-color);
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <img src="assets/icon.png" class="logo" alt="ArcGIS Velocity Simulator"/>
  <div class="app-title">ArcGIS Velocity Simulator</div>
  <div class="progress-bar-bg">
    <div class="progress-bar" id="progress"></div>
  </div>
  <div class="loading-text" id="loading-text">Initializing...</div>

  <script>
    const { ipcRenderer } = require('electron');
    
    // Listen for theme from main process
    ipcRenderer.on('splash-set-theme', (event, theme) => {
      document.body.className = theme || 'dark';
    });
    
    ipcRenderer.on('splash-progress', (event, { percent, text }) => {
      const progressBar = document.getElementById('progress');
      const loadingText = document.getElementById('loading-text');
      if (progressBar) {
        progressBar.style.width = percent + '%';
      }
      if (loadingText && text) {
        loadingText.textContent = text;
      }
    });
  </script>
</body>
</html>
