// Minimal google.protobuf.Any for use with @grpc/proto-loader.
// Source: https://github.com/protocolbuffers/protobuf/blob/main/src/google/protobuf/any.proto
syntax = "proto3";

package google.protobuf;

option java_package = "com.google.protobuf";
option java_outer_classname = "AnyProto";
option java_multiple_files = true;

message Any {
  string type_url = 1;
  bytes value = 2;
}

